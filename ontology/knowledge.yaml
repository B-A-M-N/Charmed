## Common Pairings (recommended defaults)

viewport <> help.Model
viewport <> key.Binding
list.Model <> help.Model
textarea <> help.Model
textarea <> key.Binding
textinput <> key.Binding
viewport <> lipgloss.Style
list.Model <> lipgloss.Style
status_bar <> lipgloss.Style
