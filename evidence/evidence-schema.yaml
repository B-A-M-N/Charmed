# Example 4: Animation loop (harmonica)
repo: smooth-scroll-example
file: scroll/animated.go
line: 56
context: AnimatedViewModel.Update

signals:
  - id: sig_spring_field
    primitive: animated_transition
    pattern: "spring harmonica.Spring"
    scope: method
    owner: AnimatedViewModel

  - id: sig_spring_update
    primitive: animated_transition
    pattern: "m.spring.Update()"
    scope: method
    owner: AnimatedViewModel

  - id: sig_tick_msg
    primitive: tick_source
    pattern: "case tickMsg"
    scope: method
    owner: AnimatedViewModel
    precedes: [sig_spring_update]

  - id: sig_interpolated_read
    primitive: render_phase
    pattern: "m.spring.Value()"
    scope: method
    owner: AnimatedViewModel
    requires: [sig_spring_update]

topology:
  structure_type: graph
  nodes: [sig_tick_msg, sig_spring_update, sig_interpolated_read]
  edges:
    - from: sig_tick_msg
      to: sig_spring_update
      relationship: calls
      confidence: 1.0
    - from: sig_spring_update
      to: sig_interpolated_read
      relationship: depends_on
      confidence: 0.95
  lifecycle_phase: update
  async_boundary: true
  io_boundary: false

confidence: 0.88
extraction_method: grep
extracted_at: 2026-05-28T10:15:00Z

