# Violation evidence (anti-pattern)
repo: buggy-tui
file: app/broken.go
line: 120
context: BrokenModel.Update

signals:
  - id: sig_storage_in_update
    primitive: storage_boundary
    pattern: "data := skate.Get(key)"
    scope: method
    owner: BrokenModel
    conflicts: [sig_update_phase]

  - id: sig_update_phase
    primitive: update_phase
    pattern: "func (m BrokenModel) Update(msg tea.Msg)"
    scope: method
    owner: BrokenModel

topology:
  structure_type: sequence
  nodes: [sig_update_phase, sig_storage_in_update]
  edges:
    - from: sig_update_phase
      to: sig_storage_in_update
      relationship: calls
      confidence: 1.0
  lifecycle_phase: update
  async_boundary: false
  io_boundary: true  # VIOLATION: I/O in update phase

confidence: 1.0
extraction_method: ast
extracted_at: 2026-05-28T10:20:00Z

# Linked to issue resolution
issue_url: https://github.com/buggy-tui/issues/42
fix_commit: abc123
fix_pattern: "Moved storage to Cmd wrapper"
