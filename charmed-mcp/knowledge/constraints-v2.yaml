id: storage_must_be_async
severity: error
category: correctness
type: empirical
confidence: 0.94

description: "Storage operations (charm, skate, file I/O) must be wrapped in async commands, never called directly from Update() or View()."
rationale: "Storage I/O can block for unpredictable durations, freezing the UI."

match:
  patterns:
    - 'charm\..*\(|skate\..*\('
    - 'os\..*File|ioutil\.'
  context: "inside Update|View"

primitives_violated: [storage_boundary, update_phase, render_phase]
message: "Storage operation in {{context}}. This blocks the event loop."

fix:
  suggestion: "Wrap storage operation in tea.Cmd. Return result via message."
  related_pattern: storage_cmd_boundary

evidence:
  derived_from_pattern: storage_cmd_boundary
  confidence_factors:
    observation_count: 14
    violation_count: 12
    fix_count: 11
  pattern_confidence: 0.94
  first_observed: "2026-02-01"

