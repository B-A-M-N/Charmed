# Meta-constraint for constraint synthesis
id: empirical_constraint_threshold
type: meta
confidence: 1.0

description: "Thresholds for promoting observed patterns to constraints"

thresholds:
  min_observations: 8        # Must see pattern in 8+ repos
  min_violations: 3          # Must see 3+ violations of absence
  min_fixes: 2               # Must see 2+ fixes applying pattern
  min_confidence: 0.75       # Pattern confidence must be >=0.75
  violation_fix_ratio: 0.5   # At least 50% of violations have fixes

synthesis_rules:
  - "If pattern meets thresholds → generate constraint"
  - "Constraint confidence = pattern.confidence * fix_success_rate"
  - "Constraint severity derived from violation impact"
  - "Constraint type = empirical (never canonical)"
