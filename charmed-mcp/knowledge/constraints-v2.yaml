id: ssh_must_cleanup_alt_screen
severity: error
category: correctness
type: canonical
confidence: 1.0

description: "wish-hosted TUIs must ensure alt screen cleanup on disconnect to avoid terminal corruption."
rationale: "SSH disconnects can be abrupt. Alt screen must be explicitly exited."

match:
  imports: "github.com/charmbracelet/wish"
  has: "tea.WithAltScreen"
  without: "ExitAltScreen|defer.*ExitAltScreen"

primitives_violated: [ssh_session, shutdown_phase]
message: "wish TUI uses alt screen without guaranteed cleanup."

fix:
  suggestion: "Add defer cleanup or ensure ExitAltScreen on disconnect."
  related_pattern: wish_lifecycle_cleanup

evidence:
  canonical: true
  runtime_requirement: "wish SSH session cleanup contract"

