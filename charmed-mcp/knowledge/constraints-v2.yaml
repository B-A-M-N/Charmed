id: background_logger_never_stdout
severity: error
category: correctness
type: canonical
confidence: 1.0

description: "TUI applications must never log to stdout, only stderr or files. stdout is the rendering surface."
rationale: "Writing to stdout corrupts the Bubble Tea rendering."

match:
  patterns:
    - 'log\.Print\(|fmt\.Print\(|println\('
    - 'log\.SetOutput\(os\.Stdout\)'
  context: "anywhere"

primitives_violated: [background_logger, render_phase]
message: "Logging to stdout detected. This will corrupt TUI rendering."

fix:
  suggestion: "Use log.SetOutput(os.Stderr) or write to file. Never use stdout."

evidence:
  canonical: true
  runtime_requirement: "bubbletea rendering contract"

