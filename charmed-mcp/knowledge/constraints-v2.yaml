id: no_spring_calculation_in_view
severity: warning
category: performance
type: empirical
confidence: 0.88

description: "Spring physics calculations should happen in Update() phase, View() should only read interpolated values."
rationale: "Physics calculations in View() cause frame drops and inconsistent animation."

match:
  pattern: "harmonica.*\\.Update\\(|Spring.*\\.Update\\("
  context: "inside View"

primitives_violated: [animated_transition, render_phase]
message: "Spring physics update in View(). This causes unnecessary recalculation every render."

fix:
  suggestion: "Update spring physics in Update() on tick messages. View() only reads spring.Value()."
  related_pattern: animation_loop_with_cleanup

evidence:
  derived_from_pattern: animation_loop_with_cleanup
  confidence_factors:
    observation_count: 17
    pattern_matches: 14
  confidence_basis: "observed best practice in animation repos"

