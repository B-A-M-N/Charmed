id: style_recomputation_hot_path
severity: warning
category: performance
type: canonical
confidence: 1.0

description: "Lip Gloss styles are recomputed on every render instead of being cached."
rationale: "Style computation involves allocations and calculations that should happen once."

match:
  pattern: "lipgloss\\.NewStyle\\(|\\.Width\\(|\\.Height\\("
  context: "inside View|Update"

primitives_violated: [render_phase, layout_composition]
message: "Style/layout computation inside hot path. Recomputing every frame wastes CPU and causes GC pressure."

fix:
  suggestion: "Cache styles computed from model state. Only recompute when input data changes."

evidence:
  canonical: true
  runtime_requirement: "lipgloss style creation allocates"

