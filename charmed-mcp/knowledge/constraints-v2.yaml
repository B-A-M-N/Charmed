id: adaptive_color_detect_once
severity: warning
category: performance
type: empirical
confidence: 0.82

description: "Terminal color capability detection should happen once in Init(), not on every render."
rationale: "colorprofile.Detect() reads environment variables and performs capability tests."

match:
  pattern: "colorprofile\\.Detect\\("
  context: "inside View|Update"

primitives_violated: [terminal_capability, render_phase]
message: "Color capability detection in {{context}}. This should happen once in Init()."

fix:
  suggestion: "Call colorprofile.Detect() in Init(), store result in model, use cached value in View()."
  related_pattern: adaptive_color_scheme_init

evidence:
  derived_from_pattern: null  # Not yet induced, but observed
  observations:
    - repo: colorprofile-examples
      pattern: "Detect once, cache result"
  confidence_basis: "limited observations, logical inference"

