# Constraints V2 - Evidence-Based Architecture Rules
# Mix of canonical (hand-authored) and empirical (pattern-derived) constraints.
#
# Canonical: confidence=1.0, based on runtime semantics
# Empirical: confidence<1.0, based on observed patterns and violations

version: 2

---

id: no_blocking_update
severity: error
category: correctness
type: canonical
confidence: 1.0

description: "Blocking I/O or synchronous calls inside Update() block the event loop and freeze the UI."
rationale: "Bubble Tea's runtime is single-threaded. Update() must return immediately."

match:
  function: "Update"
  contains_any:
    - pattern: 'http\.(Get|Post|Do)\('
      label: "HTTP call"
    - pattern: 'ioutil\.ReadFile|os\.ReadFile'
      label: "File I/O"
    - pattern: 'time\.Sleep'
      label: "Sleep in Update"
    - pattern: 'sql\..*\.Query'
      label: "Synchronous DB query"

primitives_violated: [update_phase]
message: "{{label}} detected inside {{function}}(). The event loop blocks until this completes — the TUI will freeze."

fix:
  suggestion: "Wrap in tea.Cmd: return func() tea.Msg { ... }"
  pattern: "tea.Command(func() tea.Cmd { ... })"
  related_pattern: storage_cmd_boundary

evidence:
  canonical: true
  runtime_requirement: "bubbletea event loop contract"

---

id: god_model
severity: error
category: architecture
type: empirical
confidence: 0.89

description: "Update() function is too large, indicating a monolithic model that should be decomposed."
rationale: "Large Update() functions violate single-responsibility and become unmaintainable."

match:
  function: "Update"
  loc_greater_than: 300

primitives_violated: [message_router, component_tree]
message: "Update() is {{loc}} lines. This model owns too much state and handles too many message types."

fix:
  suggestion: "Decompose into child models. Use composition: each child model has its own Update/View. Parent orchestrates message passing."
  related_pattern: component_tree

evidence:
  derived_from_pattern: null  # This is a heuristic, not pattern-derived yet
  observations:
    - "Models >300 LOC correlate with maintenance issues"
    - "Refactoring to child models improves testability"
  confidence_basis: "architectural heuristic + observation"

---

id: viewport_recreation
severity: fatal
category: performance
type: canonical
confidence: 1.0

description: "viewport.Model is recreated every render or every Update(), causing scroll position reset and layout flicker."
rationale: "viewport.Model maintains scroll state. Recreation destroys that state."

match:
  type: "viewport.Model"
  pattern: "viewport\\.New\\("
  context: "inside Update|View"

primitives_violated: [viewport, render_phase]
message: "viewport.Model is being recreated inside {{context}}. This resets scroll position every frame, causing visible flicker."

fix:
  suggestion: "Create viewport once in Init() or as a field on the struct. Only call SetContent() when content changes, not on every update."
  related_pattern: viewport_content_diffing

evidence:
  canonical: true
  runtime_requirement: "viewport state persistence"

---

id: viewport_churn
severity: error
category: performance
type: empirical
confidence: 0.94

description: "viewport.SetContent() is called too frequently, indicating content is being reset rather than diffed."
rationale: "Frequent SetContent calls cause unnecessary rerenders and scroll instability."

match:
  function: "SetContent"
  call_frequency: "> 1/frame"

primitives_violated: [viewport, diffed_content]
message: "SetContent called more than once per frame. Content is being reset instead of appended."

fix:
  suggestion: "In streaming/append mode, build content incrementally. Only call SetContent when content actually changes (diff check)."
  related_pattern: viewport_content_diffing

evidence:
  derived_from_pattern: viewport_content_diffing
  confidence_factors:
    observation_count: 9
    violation_count: 4
    fix_count: 4
  pattern_confidence: 0.85
  boosted_by: "strong violation-fix correlation"

