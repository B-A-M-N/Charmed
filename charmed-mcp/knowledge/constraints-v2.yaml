id: must_cleanup_tickers
severity: error
category: correctness
type: empirical
confidence: 0.91

description: "Animation tickers and periodic event sources must have cleanup handlers to prevent goroutine leaks."
rationale: "Tickers spawn background goroutines that continue running after TUI exits if not stopped."

match:
  patterns:
    - 'tea\.Tick\(|time\.NewTicker\('
  without: 'Quit|Stop\('
  scope: model

primitives_violated: [tick_source, cancellation_boundary]
message: "Ticker created without corresponding cleanup handler."

fix:
  suggestion: "Add quit message handler that stops ticker or returns tea.Quit."
  related_pattern: animation_loop_with_cleanup

evidence:
  derived_from_pattern: animation_loop_with_cleanup
  confidence_factors:
    observation_count: 17
    violation_count: 6
    fix_count: 5
  pattern_confidence: 0.87

