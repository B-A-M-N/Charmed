# Pattern Induction Schema
# Patterns emerge from clustering evidence with equivalent topologies.
# Patterns are EMPIRICAL - derived from observed implementations.
#
# Confidence is based on:
# - Number of observations
# - Consistency across repos
# - Violation/fix correlation

version: 1
schema_type: pattern_induction

# Pattern definition
pattern:
  id: string                  # Unique pattern identifier (e.g., "viewport_content_diffing")
  name: string                # Human-readable name
  category: enum              # [lifecycle, async, rendering, state, coordination, infrastructure]

  # Core definition
  primitives: list[string]    # Primitive IDs from primitives.yaml
  topology_signature: string  # Normalized topology hash

  # Confidence and derivation
  confidence: float           # 0.0-1.0 based on evidence strength
  confidence_factors:
    observation_count: int    # Number of repos exhibiting this
    consistency_score: float  # How consistent implementations are
    violation_count: int      # Times absence caused issues
    fix_count: int            # Times this pattern fixed issues

  # Evidence
  derived_from:
    observations: list[observation_ref]
    violations: list[violation_ref]
    fixes: list[fix_ref]

  # Pattern structure
  structure:
    type: enum                # [sequence, tree, graph, pipeline]
    nodes: list[primitive_usage]
    edges: list[relationship]
    invariants: list[invariant]

  # Usage guidance
  applies_to: list[string]    # Which primitives this enhances
  generalizes_to: list[string] # Higher-level patterns this enables
  conflicts_with: list[string] # Incompatible patterns

  # Constraints derived from this pattern
  synthesized_constraints: list[constraint_ref]

  # Metadata
  first_observed: timestamp
  last_updated: timestamp
  observation_period: duration

# Evidence references
observation_ref:
  repo: string
  file: string
  line: int
  evidence_id: string         # Reference to evidence/repo-name/evidence-id.yaml
  extracted_at: timestamp

violation_ref:
  repo: string
  issue_url: string
  symptom: string             # What went wrong
  root_cause: string          # Why it happened
  evidence_id: string

fix_ref:
  repo: string
  commit_sha: string
  pr_url: string
  before_evidence_id: string
  after_evidence_id: string
  improvement: string         # Quantifiable if possible

# Primitive usage within pattern
primitive_usage:
  primitive_id: string
  role: string                # What role this primitive plays
  required: bool              # Must be present vs optional
  cardinality: string         # "1", "0..1", "1..n", etc.

# Relationships between primitives in pattern
relationship:
  from: string                # Primitive ID
  to: string                  # Primitive ID
  type: enum                  # [calls, emits, depends_on, invalidates, precedes]
  required: bool
  timing: string              # e.g., "immediate", "deferred", "async"

# Invariant - property that must hold
invariant:
  description: string
  violated_by: list[string]   # Signal patterns that break this
  enforced_by: list[string]   # Constraint IDs that check this

# Constraint reference
constraint_ref:
  constraint_id: string       # From constraints/ directory
  confidence: float           # How confident this constraint is
  derived_from_pattern: bool  # vs hand-authored

---

# EXAMPLE PATTERNS

# Pattern 1: Viewport Content Diffing
id: viewport_content_diffing
name: "Viewport Content Diffing"
category: rendering

primitives:
  - viewport
  - diffed_content

topology_signature: "seq:diffed_content->viewport.SetContent"

confidence: 0.85
confidence_factors:
  observation_count: 9
  consistency_score: 0.92
  violation_count: 4
  fix_count: 4

derived_from:
  observations:
    - repo: soft-serve
      file: ui/dashboard.go
      line: 156
      evidence_id: softserve_001
      extracted_at: 2026-05-20T14:30:00Z
    - repo: glow
      file: ui/pager.go
      line: 89
      evidence_id: glow_003
      extracted_at: 2026-05-21T09:15:00Z
    # ... 7 more

  violations:
    - repo: early-tui-app
      issue_url: https://github.com/example/early-tui-app/issues/12
      symptom: "Viewport scroll position resets on every update"
      root_cause: "SetContent called without checking if content changed"
      evidence_id: early_violation_001

  fixes:
    - repo: early-tui-app
      commit_sha: def456
      pr_url: https://github.com/example/early-tui-app/pull/15
      before_evidence_id: early_violation_001
      after_evidence_id: early_fix_001
      improvement: "Scroll position stable, reduced flicker"

structure:
  type: sequence
  nodes:
    - primitive_id: diffed_content
      role: "Content change detection"
      required: true
      cardinality: "1"
    - primitive_id: viewport
      role: "Scrollable content display"
      required: true
      cardinality: "1"
  edges:
    - from: diffed_content
      to: viewport
      type: depends_on
      required: true
      timing: immediate
  invariants:
    - description: "SetContent only called when content actually changed"
      violated_by: ["direct_setcontent_without_check"]
      enforced_by: ["viewport_churn"]

applies_to: [viewport]
generalizes_to: [streaming_console, log_viewer, chat_interface]
conflicts_with: [full_rerender_every_frame]

synthesized_constraints:
  - constraint_id: viewport_churn
    confidence: 0.94
    derived_from_pattern: true

first_observed: 2026-03-15T00:00:00Z
last_updated: 2026-05-28T00:00:00Z
