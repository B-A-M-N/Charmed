# Pattern 3: Animation Loop with Cleanup
id: animation_loop_with_cleanup
name: "Animation Loop with Cleanup"
category: async

primitives:
  - tick_source
  - animated_transition
  - cancellation_boundary
  - shutdown_phase

topology_signature: "tree:tick_source->animation+shutdown->cancel"

confidence: 0.87
confidence_factors:
  observation_count: 17
  consistency_score: 0.89
  violation_count: 6
  fix_count: 5

derived_from:
  observations:
    - repo: harmonica-examples
      file: smooth-scroll/main.go
      line: 67
      evidence_id: harmonica_anim_001
      extracted_at: 2026-05-05T16:45:00Z
    # ... 16 more

  violations:
    - repo: leaky-animation-app
      issue_url: https://github.com/example/leaky-app/issues/23
      symptom: "Goroutine leak, ticker not stopped"
      root_cause: "No cleanup handler for animation ticker"
      evidence_id: leak_violation_001
    # ... 5 more

  fixes:
    - repo: leaky-animation-app
      commit_sha: 1a2b3c4
      pr_url: https://github.com/example/leaky-app/pull/25
      before_evidence_id: leak_violation_001
      after_evidence_id: leak_fix_001
      improvement: "Goroutine count stable, no leaks"
    # ... 4 more

structure:
  type: tree
  nodes:
    - primitive_id: tick_source
      role: "Generates animation frames"
      required: true
      cardinality: "1"
    - primitive_id: animated_transition
      role: "Interpolates state over time"
      required: true
      cardinality: "1"
    - primitive_id: shutdown_phase
      role: "Detects quit signal"
      required: true
      cardinality: "1"
    - primitive_id: cancellation_boundary
      role: "Stops ticker"
      required: true
      cardinality: "1"
  edges:
    - from: tick_source
      to: animated_transition
      type: calls
      required: true
      timing: periodic
    - from: shutdown_phase
      to: cancellation_boundary
      type: calls
      required: true
      timing: immediate
    - from: cancellation_boundary
      to: tick_source
      type: invalidates
      required: true
      timing: immediate
  invariants:
    - description: "Every tick source must have corresponding cancellation"
      violated_by: ["ticker_without_cleanup"]
      enforced_by: ["must_cleanup_tickers"]

applies_to: [tick_source, animated_transition]
generalizes_to: [periodic_refresh, progress_animation, live_dashboard]
conflicts_with: [unbounded_tick]

synthesized_constraints:
  - constraint_id: must_cleanup_tickers
    confidence: 0.91
    derived_from_pattern: true

first_observed: 2026-03-10T00:00:00Z
last_updated: 2026-05-28T00:00:00Z
observation_period: 79d
