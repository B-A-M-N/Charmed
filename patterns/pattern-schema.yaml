# Pattern 2: Storage Cmd Boundary
id: storage_cmd_boundary
name: "Storage Wrapped in Async Command"
category: infrastructure

primitives:
  - storage_boundary
  - async_cmd
  - update_phase

topology_signature: "pipeline:update->cmd->storage->result_msg"

confidence: 0.94
confidence_factors:
  observation_count: 14
  consistency_score: 0.96
  violation_count: 12
  fix_count: 11

derived_from:
  observations:
    - repo: charm-app-1
      file: app/config.go
      line: 45
      evidence_id: charm1_storage_001
      extracted_at: 2026-04-10T11:20:00Z
    # ... 13 more

  violations:
    - repo: blocking-storage-app
      issue_url: https://github.com/example/blocking-app/issues/8
      symptom: "UI freezes when saving settings"
      root_cause: "skate.Set() called directly in Update()"
      evidence_id: blocking_violation_001
    # ... 11 more

  fixes:
    - repo: blocking-storage-app
      commit_sha: 7f8g9h0
      pr_url: https://github.com/example/blocking-app/pull/10
      before_evidence_id: blocking_violation_001
      after_evidence_id: blocking_fix_001
      improvement: "UI remains responsive during save, 0ms Update() time"
    # ... 10 more

structure:
  type: pipeline
  nodes:
    - primitive_id: update_phase
      role: "Initiates storage operation"
      required: true
      cardinality: "1"
    - primitive_id: async_cmd
      role: "Wraps storage I/O"
      required: true
      cardinality: "1"
    - primitive_id: storage_boundary
      role: "Performs I/O operation"
      required: true
      cardinality: "1"
  edges:
    - from: update_phase
      to: async_cmd
      type: calls
      required: true
      timing: immediate
    - from: async_cmd
      to: storage_boundary
      type: calls
      required: true
      timing: async
    - from: storage_boundary
      to: update_phase
      type: emits
      required: true
      timing: deferred
  invariants:
    - description: "Storage I/O never called directly from Update() or View()"
      violated_by: ["storage_in_update", "storage_in_view"]
      enforced_by: ["no_blocking_update", "no_io_in_view"]

applies_to: [storage_boundary, persisted_state]
generalizes_to: [any_io_boundary, network_calls, database_queries]
conflicts_with: [synchronous_storage]

synthesized_constraints:
  - constraint_id: no_blocking_update
    confidence: 0.98
    derived_from_pattern: true
  - constraint_id: storage_must_be_async
    confidence: 0.94
    derived_from_pattern: true

first_observed: 2026-02-01T00:00:00Z
last_updated: 2026-05-28T00:00:00Z
observation_period: 116d

